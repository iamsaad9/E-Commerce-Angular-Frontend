<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Login to Your Account</h2>

    <div
      *ngIf="errorMessage()"
      class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm"
    >
      {{ errorMessage() }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-700">Email Address</label>
        <input
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
        />
        <span
          *ngIf="loginForm.controls.email.touched && loginForm.controls.email.invalid"
          class="text-xs text-red-500"
        >
          Please provide a valid email address.
        </span>
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-700">Password</label>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
        />
        <span
          *ngIf="loginForm.controls.password.touched && loginForm.controls.password.invalid"
          class="text-xs text-red-500"
        >
          Password must be at least 6 characters long.
        </span>
      </div>

      <button
        type="submit"
        [disabled]="isLoading() || loginForm.invalid"
        class="w-full py-2.5 px-4 rounded-lg text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition"
      >
        {{ isLoading() ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
  </div>
</div>
